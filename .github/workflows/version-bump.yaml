on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - dev

name: version-bump

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install usethis
        run: |
          install.packages("usethis")
        shell: Rscript {0}

      - name: Bump version
        id: bump
        run: |
          usethis::use_version("${{ inputs.bump }}")
          version <- as.character(read.dcf("DESCRIPTION")[, "Version"])
          cat(sprintf("new_version=%s\n", version), file = Sys.getenv("GITHUB_OUTPUT"))
        shell: Rscript {0}

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DESCRIPTION NEWS.md || git add DESCRIPTION
          git commit -m "Bump version to ${{ steps.bump.outputs.new_version }}"
          if [ "${{ inputs.bump }}" != "dev" ]; then
            git tag "v${{ steps.bump.outputs.new_version }}"
          fi
          git push
          git push --tags
