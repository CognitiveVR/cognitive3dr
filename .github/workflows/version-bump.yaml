on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - dev

name: version-bump

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install usethis
        run: |
          install.packages(c("usethis", "withr"))
        shell: Rscript {0}

      - name: Bump version
        id: bump
        run: |
          options(usethis.quiet = FALSE)
          withr::local_options(list(rlang_interactive = FALSE))
          usethis::use_version("${{ inputs.bump }}")
          version <- as.character(read.dcf("DESCRIPTION")[, "Version"])
          cat(sprintf("new_version=%s\n", version), file = Sys.getenv("GITHUB_OUTPUT"))
        shell: Rscript {0}

      - name: Create PR with version bump
        run: |
          BRANCH="version-bump/${{ steps.bump.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "Bump version to ${{ steps.bump.outputs.new_version }}"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Bump version to ${{ steps.bump.outputs.new_version }}" \
            --body "Automated ${{ inputs.bump }} version bump to ${{ steps.bump.outputs.new_version }}."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
